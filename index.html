<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZeroFlen: Ranking global, música IA y comunidad en tiempo real. Únete al Imperio Digital.">
    <meta name="keywords" content="ZeroFlen, Ranking, Música IA, Comunidad, Observadores, Supabase">
    <meta name="author" content="ZeroFlen">
    <meta property="og:title" content="ZeroFlen - El Imperio Digital">
    <meta property="og:description" content="Ranking global, música IA y comunidad en tiempo real. Únete al Imperio Digital.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zeroflen.com">
    <meta property="og:image" content="https://zeroflen.com/icono-zeroflen.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>ZeroFlen</title>
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="security.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="icon" type="image/png" href="icono-zeroflen.png">
</head>
<body>
    <!-- ============ GATEKEEPER MODAL ============ -->
    <div id="gatekeeper-modal" class="gatekeeper-modal">
        <!-- ... (sin cambios, igual que antes) ... -->
    </div>

    <!-- ============ LAYOUT PRINCIPAL (3 COLUMNAS) ============ -->
    <div class="zeroflen-layout">
        <!-- COLUMNA 1: RANKING -->
        <aside id="ranking-sidebar" class="ranking-sidebar">
            <!-- ... (sin cambios) ... -->
        </aside>

        <!-- COLUMNA 2: LOBBY -->
        <main id="lobby-main" class="lobby-main">
            <!-- ... (sin cambios) ... -->
        </main>

        <!-- COLUMNA 3: MENÚ -->
        <aside id="menu-sidebar" class="menu-sidebar">
            <!-- ... (sin cambios) ... -->
        </aside>
    </div>

    <!-- BOTONES FLOTANTES PARA MÓVIL -->
    <!-- ... (sin cambios) ... -->

    <!-- Botón flotante de música -->
    <button id="music-toggle-btn" class="music-toggle-btn" style="display: none;">
        <img id="music-toggle-icon" src="" alt="music">
    </button>

    <!-- ============ MODAL COMUNIDAD ============ -->
    <div id="comunidad-modal" class="comunidad-modal">
        <div class="comunidad-overlay"></div>
        <div class="comunidad-container">
            <div class="comunidad-header">
                <h2>📡 FRECUENCIA ZERO</h2>
                <button class="btn-close-comunidad">✕</button>
            </div>
            <div class="comunidad-mensajes" id="comunidad-mensajes">
                <!-- Los mensajes se cargarán aquí -->
            </div>
            <div class="comunidad-input-area">
                <input type="text" id="comunidad-input" class="comunidad-input" placeholder="Escribe tu mensaje..." maxlength="200">
                <button class="btn-transmitir" id="btn-transmitir">TRANSMITIR</button>
            </div>
            <div class="comunidad-footer">
                <button class="btn-volver-comunidad">◄ VOLVER AL LOBBY</button>
            </div>
        </div>
    </div>

    <!-- ============ MODAL DE SELECCIÓN DE TEMAS ============ -->
    <div id="temas-modal" class="temas-modal">
        <div class="temas-overlay"></div>
        <div class="temas-container">
            <div class="temas-header">
                <h2>🎨 MUTACIÓN CROMÁTICA</h2>
                <button class="btn-close-temas">✕</button>
            </div>
            <div class="temas-content">
                <p class="temas-descripcion">Elige la frecuencia visual de ZeroFlen:</p>
                <div class="temas-grid" id="temas-grid">
                    <!-- Las opciones se generarán con JS -->
                </div>
                <div class="temas-actions">
                    <button class="btn-temas-guardar" id="btn-temas-guardar">GUARDAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ MODAL GALERÍA ============ -->
    <div id="galeria-modal" class="galeria-modal">
        <div class="galeria-overlay"></div>
        <div class="galeria-container">
            <div class="galeria-header">
                <h2>🎵 MUTACIÓN MÚSICA</h2>
                <button class="btn-close-galeria">✕</button>
            </div>
            <div class="galeria-grid" id="galeria-grid">
                <!-- Las cards se generarán con JS -->
            </div>
            <div class="galeria-footer">
                <button class="btn-volver-galeria">◄ VOLVER AL LOBBY</button>
            </div>
        </div>
    </div>

    <!-- ============ MODAL IDENTIDAD ============ -->
    <div id="identidad-modal" class="identidad-modal">
        <div class="identidad-overlay"></div>
        <div class="identidad-container">
            <div class="identidad-header">
                <h2>👤 IDENTIDAD DEL OBSERVADOR</h2>
                <button class="btn-close-identidad">✕</button>
            </div>
            <div class="identidad-content">
                <p class="identidad-info">Aquí puedes ver tu información y gestionar tu privacidad.</p>
                <div class="identidad-datos" id="identidad-datos"></div>
                <div class="identidad-toggle">
                    <span class="identidad-toggle-label">Mostrar país en el ranking</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="identidad-show-country" checked>
                        <label for="identidad-show-country" class="toggle-label"></label>
                    </div>
                </div>
                <div class="identidad-clave">
                    <span class="clave-label">LLAVE:</span>
                    <span class="clave-valor" id="identidad-clave-valor">---</span>
                    <button class="btn-copiar" id="btn-copiar-clave" title="Copiar clave">📋</button>
                </div>
            </div>
            <div class="identidad-footer">
                <button class="btn-volver-identidad">◄ VOLVER AL LOBBY</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS (cargar en orden) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="database.js"></script>
    <script src="centinel.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
